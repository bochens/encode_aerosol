data_root: /Volumes/Hailstone Data/DOE_SGP
freq: 30min
split_strategy: calendar_month_hash
feature_coverage_basis: all
model_type: structured_transformer_autoencoder
latent_dim: 64
hidden_dim: 96
encoder_depth: 2
decoder_depth: 2
transformer_layers: 3
transformer_heads: 4
sequence_encoder_type: diameter_transformer
sequence_fourier_frequencies: 4
sequence_transformer_heads: 4
conditional_ccn_decoder: true
sizing_crosstalk_layers: 0
sizing_crosstalk_heads: 4
decoder_expansion_depth: 4

temporal_windows:
  enabled: true
  default_step: 30min
  default_stats: [mean]
  time_position_frequencies: 4
  modality_steps:
    met_context: 1min
    chemistry_acsm: 30min
    size_smps: 5min
    size_aps: 1min
    size_uhsas: 1min
    size_opc: 1min
    cpc_number: 1min
    ccn_activation: 1min
    optical_neph: 1min
  modality_stats:
    met_context: [mean, std]
    cpc_number: [mean, std, min, max]
    ccn_activation: [mean, std]
    optical_neph: [mean, std]

size_grid:
  enabled: true
  min_diameter_nm: 3.0
  max_diameter_nm: 30000.0
  bins: 160
  interpolation: linear_log_diameter
  diameter_units:
    diameter_mobility: nm
    diameter_optical: nm
    diameter_aerodynamic: um
    diameter_midpoint: um

closure_loss_weights:
  dry_scattering_from_size_composition: 0.03
  humidification_response: 0.03
  ccn_activation_ratio: 0.02

cross_prediction_selection_mode: leave_one_out
cross_prediction_exclusion_groups:
  - [size_smps, size_aps, size_uhsas, size_opc]

batch_size: 64
learning_rate: 0.0004
learning_rate_schedule: cosine
min_learning_rate: 0.00005
weight_decay: 0.00001
input_mask_probability: 0.35
latent_l2_weight: 0.000001
kl_weight: 0.0
min_feature_coverage: 0.005
min_feature_std: 0.001
validation_fraction: 0.15
test_fraction: 0.15
validation_interval: 5
reconstruction_validation_interval: 0
diagnostic_validation_interval: 20
seed: 42

training_stages:
  - name: deterministic_autoencode_warmup
    mode: autoencode
    loss_mode: all
    epochs: 10
    feature_dropout_probability: 0.0
    feature_noise_std: 0.0
    kl_weight: 0.0
  - name: deterministic_denoise_autoencode
    mode: autoencode
    loss_mode: all
    epochs: 10
    feature_dropout_probability: 0.03
    feature_noise_std: 0.02
    kl_weight: 0.0
  - name: mixed_mild_mask
    mode: random_mask
    loss_mode: hidden_only
    epochs: 30
    input_mask_probability: 0.20
    feature_dropout_probability: 0.02
    feature_noise_std: 0.01
    kl_weight: 0.0
  - name: leave_one_out_hidden_only
    mode: leave_one_out
    loss_mode: hidden_only
    epochs: 40
    feature_dropout_probability: 0.0
    feature_noise_std: 0.0
    kl_weight: 0.0
  - name: leave_one_group_out_hidden_only
    mode: leave_one_out_unrelated
    loss_mode: hidden_only
    epochs: 30
    feature_dropout_probability: 0.0
    feature_noise_std: 0.0
    kl_weight: 0.0

modalities:
  met_context:
    role: context
    always_input: true
    streams:
      - name: aosmet_e13
        path: sgpaosmetE13.a1
        variables:
          - {name: rh_ambient}
          - {name: temperature_ambient}
          - {name: pressure_ambient}
          - {name: wind_speed}
          - {name: wind_direction, transform: angle_degrees}
          - {name: rain_amount}
          - {name: rain_intensity}

  chemistry_acsm:
    role: target
    streams:
      - name: acsm_cdce_e13
        path: sgpacsmcdceE13.c2
        variables:
          - {name: total_organics_CDCE, transform: log1p_nonnegative}
          - {name: sulfate_CDCE, transform: log1p_nonnegative}
          - {name: ammonium_CDCE, transform: log1p_nonnegative}
          - {name: nitrate_CDCE, transform: log1p_nonnegative}
          - {name: chloride_CDCE, transform: log1p_nonnegative}
          - {name: acsm_vol_conc, transform: log1p_nonnegative}
          - {name: CDCE}

  size_smps:
    role: target
    streams:
      - name: smps_e13
        path: sgpaossmpsE13.b1
        variables:
          - {name: dN_dlogDp, transform: log1p_nonnegative}
          - {name: total_N_conc, transform: log1p_nonnegative}
          - {name: total_SA_conc, transform: log1p_nonnegative}
          - {name: total_V_conc, transform: log1p_nonnegative}
          - {name: geometric_mean, transform: log1p_nonnegative}
          - {name: geometric_std}
          - {name: mean, transform: log1p_nonnegative}
          - {name: median, transform: log1p_nonnegative}
          - {name: mode, transform: log1p_nonnegative}

  size_aps:
    role: target
    streams:
      - name: aps_e13
        path: sgpaosapsE13.b1
        variables:
          - {name: dN_dlogDp, transform: log1p_nonnegative}
          - {name: total_N_conc, transform: log1p_nonnegative}
          - {name: total_SA_conc, transform: log1p_nonnegative}
          - {name: total_V_conc, transform: log1p_nonnegative}

  size_uhsas:
    role: target
    streams:
      - name: uhsas_e13
        path: sgpaosuhsasE13.b1
        variables:
          - {name: dN_dlogDp, transform: log1p_nonnegative}
          - {name: total_N_conc, transform: log1p_nonnegative}
          - {name: total_SA_conc, transform: log1p_nonnegative}
          - {name: total_V_conc, transform: log1p_nonnegative}

  size_opc:
    role: target
    streams:
      - name: opc_e13
        path: sgpaosopcE13.b1
        required: false
        variables:
          - {name: dN_dlogDp, transform: log1p_nonnegative}
          - {name: total_N_conc, transform: log1p_nonnegative}
          - {name: total_SA_conc, transform: log1p_nonnegative}
          - {name: total_V_conc, transform: log1p_nonnegative}

  cpc_number:
    role: target
    streams:
      - name: cpcf_e13
        path: sgpaoscpcfE13.b1
        variables:
          - {name: concentration, transform: log1p_nonnegative}
      - name: cpcuf_e13
        path: sgpaoscpcufE13.b1
        variables:
          - {name: concentration, transform: log1p_nonnegative}

  ccn_activation:
    role: target
    streams:
      - name: ccn2colb_e13
        path: sgpaosccn2colbE13.b1
        variables:
          - {name: N_CCN, transform: log1p_nonnegative}
          - {name: supersaturation_calculated}
          - {name: supersaturation_set_point}

  optical_neph:
    role: target
    streams:
      - name: neph_dry_e13
        path: sgpaosnephdry1mE13.b1
        variables:
          - {name: Bs_B_Dry_Neph3W, transform: log1p_nonnegative}
          - {name: Bs_G_Dry_Neph3W, transform: log1p_nonnegative}
          - {name: Bs_R_Dry_Neph3W, transform: log1p_nonnegative}
          - {name: Bbs_B_Dry_Neph3W, transform: log1p_nonnegative}
          - {name: Bbs_G_Dry_Neph3W, transform: log1p_nonnegative}
          - {name: Bbs_R_Dry_Neph3W, transform: log1p_nonnegative}
          - {name: RH_Neph_Dry}
          - {name: T_Neph_Dry}
          - {name: P_Neph_Dry}
      - name: neph_wet_e13
        path: sgpaosnephwetE13.b1
        variables:
          - {name: Bs_B_Wet_Neph3W, transform: log1p_nonnegative}
          - {name: Bs_G_Wet_Neph3W, transform: log1p_nonnegative}
          - {name: Bs_R_Wet_Neph3W, transform: log1p_nonnegative}
          - {name: Bbs_B_Wet_Neph3W, transform: log1p_nonnegative}
          - {name: Bbs_G_Wet_Neph3W, transform: log1p_nonnegative}
          - {name: Bbs_R_Wet_Neph3W, transform: log1p_nonnegative}
          - {name: RH_Neph_Wet}
          - {name: T_Neph_Wet}
          - {name: P_Neph_Wet}
