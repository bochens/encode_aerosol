prepared_arrays: artifacts/temporal_gru_30min_20161129_20230421/features/prepared_arrays.npz
output: artifacts/kappa_ccn_baseline
split: test

kappa_recipe:
  # Two-component ACSM/AMS closure defaults from Poehlker et al. (2023).
  kappa_organic: 0.12
  kappa_inorganic: 0.63
  fraction_basis: mass
  kappa_mixing_rule: geometric
  # Densities are only used when fraction_basis is set to volume.
  organic_density_g_cm3: 1.4
  inorganic_density_g_cm3: 1.75

size_merge:
  # Error-function taper half-width in log10(Dp) decades.
  merge_transition_decades: 0.08

ccn:
  supersaturation_units: percent
  integration_axis: log10_diameter
